# This workflow will check code formatting and dependencies
name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Check requirements.txt
      run: |
        # Check that all imports in Python files are in requirements.txt
        pip install -q pipreqs
        pipreqs --diff .
    
    - name: Security checks
      run: |
        pip install -q bandit
        bandit -r . --skip B101 || true
